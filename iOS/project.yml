name: Boxlog
options:
  bundleIdPrefix: com.shimondeitel.boxlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "6"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Boxlog:
    type: application
    platform: iOS
    sources:
      - path: Boxlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boxlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Boxlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BoxlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BoxlogTests
    dependencies:
      - target: Boxlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boxlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BoxlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BoxlogUITests
    dependencies:
      - target: Boxlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boxlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Boxlog:
    build:
      targets:
        Boxlog: all
        BoxlogTests: [test]
        BoxlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Boxlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Boxlog.storekit
      targets:
        - BoxlogTests
        - BoxlogUITests
    archive:
      config: Release
